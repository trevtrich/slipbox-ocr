<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slipbox OCR (Boston Edition)</title>
    <link rel="stylesheet" href="/style.css" />
</head>

<body>
    <main class="container">
        <header class="header">
            <h1>Slipbox OCR</h1>
            <p>Auto-detecting notecard OCR with computer vision + Gemini AI.</p>
        </header>

        <section class="grid">
            <div class="panel">
                <h2>Camera</h2>
                <div class="videoWrap" id="videoWrap">
                    <video id="video" autoplay playsinline></video>
                    <div class="guide" aria-hidden="true"></div>
                    <div id="liveText" class="live-text"></div>
                    <canvas id="canvas" class="hidden"></canvas>
                </div>
                <div class="row">
                    <button id="startBtn" class="primary-btn">Start camera</button>
                    <button id="captureBtn" class="primary-btn" disabled>Capture</button>
                    <button id="stopBtn" disabled>Stop</button>
                    <label class="toggle">
                        <input type="checkbox" id="autoScanToggle">
                        <span class="slider"></span>
                        Auto-detect
                    </label>
                </div>
                <div class="row">
                    <label class="label">
                        JPEG quality
                        <input id="quality" type="range" min="40" max="95" value="85" />
                    </label>
                </div>
                <p id="status" class="status">Idle</p>
                <img id="preview" class="preview hidden" alt="Capture preview" />
            </div>

            <div class="panel">
                <h2>Queue & Settings</h2>
                <div class="row">
                    <label class="label" style="flex:1">
                        Default Card Type
                        <select id="cardType" style="width: 100%; margin-top: 0.25rem;">
                            <option value="Fleeting" selected>Fleeting</option>
                            <option value="Source">Source</option>
                            <option value="Permanent">Permanent</option>
                        </select>
                    </label>
                    <label class="label" style="flex:2">
                        Grouping / Topic (Links to)
                        <input id="cardTopic" type="text" placeholder="e.g. How to Take Smart Notes"
                            style="width: 100%; margin-top: 0.25rem;" />
                    </label>
                </div>

                <h2 style="margin-top: 2rem;">1. Image Queue</h2>
                <div class="row" style="margin-top: 1rem; flex-wrap: wrap; gap: 0.5rem;" id="imageQueueList">
                    <!-- Thumbnails go here -->
                </div>
                <div class="row" style="margin-top: 1rem;">
                    <button id="processAllBtn" class="primary-btn" disabled>Process Queue (0)</button>
                </div>

                <div
                    style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                    <h2 style="margin: 0;">2. Processed Cards</h2>
                    <button id="uploadAllBtn" class="primary-btn" disabled style="padding: 0.6rem 1.2rem;">Save All to
                        Obsidian (0)</button>
                </div>
                <div id="capturesList" class="captures-list batch-list">
                    <!-- Dynamic capture items will appear here -->
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="/script.js"></script>
</body>

</html>
